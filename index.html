<title>Recomp</title>
<style>
  :root { color-scheme: light dark; --bg: #0d0d0d; }
  @media (prefers-color-scheme: light) { :root { --bg: #f2f1ee; } }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  html { -ms-overflow-style: none; scrollbar-width: none; }
  ::-webkit-scrollbar { width: 0; height: 0; display: none; }
  #root { min-height: 100%; background: var(--bg); -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
  * { -webkit-tap-highlight-color: transparent; }
  input, textarea, select { -webkit-user-select: text; user-select: text; }

  @keyframes pageFwd { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pageBack { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: translateX(0); } }
  .page-fwd { animation: pageFwd 0.22s cubic-bezier(0.22,0.61,0.36,1); }
  .page-back { animation: pageBack 0.22s cubic-bezier(0.22,0.61,0.36,1); }
  .pressable { transition: transform 0.08s ease, opacity 0.08s ease; }
  .pressable:active { transform: scale(0.96); opacity: 0.7; }
  @media (prefers-reduced-motion: reduce) {
    .page-fwd, .page-back { animation: none; }
    .pressable { transition: none; }
  }
@keyframes recompFade{from{opacity:0}to{opacity:1}}@keyframes recompPop{0%{opacity:0;transform:translateY(22px)}100%{opacity:1;transform:translateY(0)}}@keyframes recompSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}</style>
