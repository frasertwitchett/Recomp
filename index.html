const CACHE = "recomp-auto-v1";
self.addEventListener("install", function(e){ self.skipWaiting(); });
self.addEventListener("activate", function(e){
  e.waitUntil(
    caches.keys().then(function(ks){
      return Promise.all(ks.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));
    }).then(function(){ return self.clients.claim(); })
  );
});
self.addEventListener("fetch", function(e){
  if (e.request.method !== "GET") return;
  var isNav = e.request.mode === "navigate" || (e.request.destination === "document");
  if (isNav) {
    // network-first: always try to get the freshest page, fall back to cache offline
    e.respondWith(
      fetch(e.request).then(function(res){
        var copy = res.clone();
        caches.open(CACHE).then(function(c){ c.put(e.request, copy); });
        return res;
      }).catch(function(){
        return caches.match(e.request).then(function(hit){ return hit || caches.match("./"); });
      })
    );
    return;
  }
  // cache-first for everything else
  e.respondWith(
    caches.open(CACHE).then(function(c){
      return c.match(e.request).then(function(hit){
        return hit || fetch(e.request).then(function(res){ c.put(e.request, res.clone()); return res; }).catch(function(){ return hit; });
      });
    })
  );
});
`;
  var reloaded = false;
  // when a new service worker takes control, reload once to show the update
  navigator.serviceWorker.addEventListener("controllerchange", function(){
    if (reloaded) return;
    reloaded = true;
    window.location.reload();
  });
  try {
    var blob = new Blob([swCode], { type: "text/javascript" });
    var url = URL.createObjectURL(blob);
    window.addEventListener("load", function(){
      navigator.serviceWorker.register(url).then(function(reg){
        // check for updates each launch
        reg.update();
      }).catch(function(){});
    });
  } catch (e) {}
})();
</script>
